spring.application.name=Zorvyn

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/zorvyn
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Root@123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

security.token.secret=zorvyn-super-secret-change-this
security.token.ttl-minutes=120

